name: zen_focus
description: A minimal Productivity & Digital Well-being mobile app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.0.5
  flutter_local_notifications: ^17.1.2
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  font_awesome_flutter: ^10.7.0
  google_fonts: ^6.2.1
  installed_apps: ^2.1.1
  usage_stats: ^1.3.1
  flutter_overlay_window: ^0.5.0
  flutter_foreground_task: ^9.2.2
  app_blocker: ^2.1.0
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
